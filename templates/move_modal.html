<div id="move-modal" class="modal-overlay" onclick="if(event.target===this)closeMoveModal()">
  <div class="modal move-modal">
    <button class="modal-close" onclick="closeMoveModal()">&times;</button>
    <h3>Move <span id="move-item-name"></span></h3>
    <p>Select a destination folder:</p>
    <div class="move-breadcrumb" id="move-breadcrumb"></div>
    <div class="move-dir-list" id="move-dir-list">
      <div class="move-empty">Loading...</div>
    </div>
    <div class="move-target" id="move-target">
      Move to: <strong>/</strong>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeMoveModal()">Cancel</button>
      <button class="modal-btn" id="move-confirm-btn"
        style="background:var(--accent);color:#fff;border-color:var(--accent)"
        onclick="confirmMove()">Move here</button>
    </div>
  </div>
</div>
